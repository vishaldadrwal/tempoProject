<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TimeFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">⏱</div>
        <div class="logo-text">Time<span>Flow</span></div>
      </div>

      <!-- Heading -->
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Start tracking your productivity today</p>

      <!-- Alert messages -->
      <div class="alert alert-error" id="alertMsg"></div>
      <div class="alert alert-success" id="successMsg"></div>

      <!-- Register Form -->
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="Your full name"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            required
            minlength="6"
          >
        </div>

        <button type="submit" class="btn btn-primary" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="/">Sign in →</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
